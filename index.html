<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <title>GlamCam AI Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #camera-container { position: absolute; inset: 0; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #ghost-overlay {
            position: absolute; inset: 0; z-index: 2;
            background-size: cover; background-position: center;
            opacity: 0.3; pointer-events: none; mix-blend-mode: screen;
        }
        .ui-overlay { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom)) 20px; pointer-events: none; }
        #feedback-box { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 20px; text-align: center; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 12px; pointer-events: auto; }
        .state-error { border-color: #ef4444 !important; }
        .state-success { border-color: #22c55e !important; }
        #start-screen { position: absolute; inset: 0; background: #09090b; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px; text-align: center; }
        .btn-start { background: white; color: black; font-weight: 800; padding: 16px 40px; border-radius: 50px; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 class="text-3xl font-black mb-4">GlamCam AI Coach</h1>
        <button id="start-btn" class="btn-start">ابدأ التدريب</button>
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="ghost-overlay"></div>
        <canvas id="capture-canvas" style="display:none;"></canvas>
    </div>

    <div class="ui-overlay" id="main-ui" style="display: none;">
        <div class="flex justify-between items-start">
            <div class="bg-black/50 p-2 rounded-full text-[10px] font-bold">AI STATUS: <span id="ai-status">READY</span></div>
        </div>
        <div class="mb-10 w-full max-w-sm mx-auto">
            <div id="feedback-box">
                <div id="feedback-message" class="text-2xl font-black">وجه الكاميرا نحو العميل</div>
            </div>
        </div>
    </div>

<script>
    const apiKey = "AIzaSyAgzbT7WqXMg1NezrFcVGpJe0lVVt2GVhc"; // Your Key
    const webcam = document.getElementById('webcam');
    const ghost = document.getElementById('ghost-overlay');
    const startBtn = document.getElementById('start-btn');
    const feedbackMessage = document.getElementById('feedback-message');
    const feedbackBox = document.getElementById('feedback-box');

    let currentAngle = "02"; // Default center
    let currentMode = "right"; // Default good state

    // Track phone movement for Ghost Guide switching
    window.addEventListener('deviceorientation', (e) => {
        let alpha = e.alpha; 
        if (alpha < 30 || alpha > 330) currentAngle = "02";
        else if (alpha >= 30 && alpha < 180) currentAngle = "01";
        else currentAngle = "03";
        updateOverlay();
    });

    function updateOverlay() {
        // Uses your NEW filenames: z_01_right.jpg, z_02_wrong.jpg, etc.
        ghost.style.backgroundImage = `url('z_${currentAngle}_${currentMode}.jpg')`;
    }

    startBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            webcam.srcObject = stream;
            webcam.onplaying = () => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                setInterval(analyzeFrame, 5000); // 5 seconds to save quota
            };
        } catch (err) { alert("Camera Error"); }
    });

    async function analyzeFrame() {
        const canvas = document.getElementById('capture-canvas');
        canvas.width = 480;
        canvas.height = (webcam.videoHeight / webcam.videoWidth) * 480;
        canvas.getContext('2d').drawImage(webcam, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Analyze person/level/distance. Return JSON: {'person':bool, 'level':bool, 'close':bool, 'far':bool}" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const data = await response.json();
            const res = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
            
            // Logic to set feedback and update "Ghost" mode
            feedbackBox.classList.remove('state-error', 'state-success');
            if (!res.person) {
                feedbackMessage.innerText = "لا يوجد انسان في الصورة";
                currentMode = "wrong";
                feedbackBox.classList.add('state-error');
            } else if (!res.level) {
                feedbackMessage.innerText = "خليك بمستوى الرأس";
                currentMode = "wrong";
                feedbackBox.classList.add('state-error');
            } else if (res.close) {
                feedbackMessage.innerText = "بعد اكثر";
                currentMode = "wrong";
                feedbackBox.classList.add('state-error');
            } else if (res.far) {
                feedbackMessage.innerText = "قرب اكثر";
                currentMode = "wrong";
                feedbackBox.classList.add('state-error');
            } else {
                feedbackMessage.innerText = "ممتاز ✨";
                currentMode = "right";
                feedbackBox.classList.add('state-success');
            }
            updateOverlay();
        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
